<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Screen Veil Install</title>
  <meta name="robots" content="noindex">
  <style>
    :root{--bg:#081226;--panel:#0f1b33;--line:#233556;--text:#eef2ff;--muted:#b7c3dd;--accent:#6b5cff}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#081226,#101a2d);color:var(--text)}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}.card{max-width:680px;background:rgba(15,27,51,.92);border:1px solid var(--line);border-radius:24px;padding:32px;box-shadow:0 18px 50px rgba(0,0,0,.28)}
    h1{margin:0 0 12px;font-size:40px;line-height:1.05} p{color:var(--muted);line-height:1.7} .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
    a{display:inline-block;padding:12px 16px;border-radius:14px;text-decoration:none;font-weight:700} .primary{background:#6b5cff;color:#fff}.secondary{border:1px solid var(--line);color:#eef2ff}
    code{background:#091324;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Screen Veil install link</h1>
      <p>This page should redirect to your real Chrome Web Store listing after your first private or unlisted upload.</p>
      <p>Until then, replace <code>REAL_CHROME_WEB_STORE_URL</code> below or leave this page as a holding screen.</p>
      <div class="row">
        <a class="primary" href="REAL_CHROME_WEB_STORE_URL">Open Chrome Web Store listing</a>
        <a class="secondary" href="../landing-page/index.html">Back to homepage</a>
      </div>
    </div>
  </div>
</body>
</html>
