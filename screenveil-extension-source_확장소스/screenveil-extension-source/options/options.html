<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Screen Veil Settings</title>
    <style>
      body {
        max-width: 860px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: Arial, sans-serif;
        color: #111827;
      }
      h1 {
        margin-bottom: 8px;
      }
      p {
        color: #374151;
        line-height: 1.55;
      }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 20px;
        margin-top: 16px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 16px;
      }
      input[type='range'] {
        padding: 0;
      }
      button {
        margin-top: 16px;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        background: #111827;
        color: white;
        cursor: pointer;
      }
      button.secondary {
        margin-top: 0;
        background: #f3f4f6;
        color: #111827;
      }
      .success {
        margin-top: 12px;
        color: #065f46;
        min-height: 18px;
      }
      .success.error {
        color: #b91c1c;
      }
      .note {
        font-size: 14px;
        color: #6b7280;
      }
      ul {
        line-height: 1.8;
        columns: 2;
        padding-left: 18px;
      }
      .pill {
        display: inline-block;
        margin-top: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 14px;
        font-weight: 700;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .range-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .range-value {
        min-width: 72px;
        text-align: right;
        font-weight: 700;
        color: #111827;
      }
      .custom-sites {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }
      .custom-site-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
      }
      .custom-site-meta {
        min-width: 0;
      }
      .custom-site-name {
        font-weight: 700;
      }
      .custom-site-pattern {
        font-size: 12px;
        color: #6b7280;
        word-break: break-all;
      }
      @media (max-width: 680px) {
        .grid {
          grid-template-columns: 1fr;
        }
        ul {
          columns: 1;
        }
        .custom-site-row {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <h1 id="titleEl">Screen Veil Settings</h1>
    <p id="introEl"></p>

    <div class="grid">
      <div class="card">
        <label for="idleSeconds" id="idleLabel"></label>
        <input id="idleSeconds" type="number" min="15" max="600" step="1" />
        <div class="note" id="idleHint"></div>
      </div>

      <div class="card">
        <label for="pin" id="pinLabel"></label>
        <input id="pin" type="password" minlength="4" />
        <div class="note" id="pinHint"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <label for="languageSelect" id="languageLabel"></label>
        <select id="languageSelect">
          <option value="auto"></option>
          <option value="en"></option>
          <option value="ko"></option>
          <option value="ja"></option>
          <option value="zh-CN"></option>
        </select>
        <div class="note" id="languageHint"></div>
      </div>

      <div class="card">
        <label for="blurStrength" id="blurLabel"></label>
        <div class="range-row">
          <input id="blurStrength" type="range" min="4" max="40" step="1" />
          <div id="blurValue" class="range-value"></div>
        </div>
        <div class="note" id="blurHint"></div>
      </div>
    </div>

    <div class="card">
      <label for="hotkeyRecorder" id="hotkeyLabel"></label>
      <input id="hotkeyRecorder" type="text" readonly />
      <div class="note" id="hotkeyHint"></div>
      <div class="pill" id="chromeHotkeyHint"></div>
      <div class="note" id="hotkeyDetail" style="margin-top:12px;"></div>
    </div>

    <div class="card">
      <button id="saveButton"></button>
      <div id="message" class="success"></div>
    </div>

    <div class="card">
      <strong id="presetSitesTitle"></strong>
      <ul id="presetSitesList"></ul>
      <p id="presetSitesNote" class="note"></p>
    </div>

    <div class="card">
      <strong id="customSitesTitle"></strong>
      <div id="customSitesEmpty" class="note" style="margin-top:10px;"></div>
      <div id="customSitesList" class="custom-sites"></div>
      <p id="customSitesHint" class="note"></p>
    </div>

    <script src="../common/i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
